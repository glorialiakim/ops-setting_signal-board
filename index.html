<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>글로벌 CS 운영 함께 단계 올리기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--red:#971B2F;--bg:#f0f2f7;--line:#e2e8f0;--ok:#22c55e;--no:#ef4444;
--tA:#6366f1;--tB:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:#101820;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
header{background:linear-gradient(135deg,#971B2F,#c0392b);padding:14px 20px;box-shadow:0 4px 20px rgba(151,27,47,.3)}
.hi{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.logo h1{font-size:15px;font-weight:800;color:#fff}
.logo p{font-size:10px;color:rgba(255,255,255,.6);font-weight:600;margin-top:1px}
.nav{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.nav-btn{padding:6px 13px;border-radius:18px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:.15s}
.nav-btn:hover,.nav-btn.on{background:rgba(255,255,255,.25)}
.user-info{color:rgba(255,255,255,.8);font-size:10px;font-weight:600}
.page{display:none;max-width:1200px;margin:0 auto;padding:20px 14px}
.page.active{display:block}
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border-radius:18px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap}
.btn.green{background:#22c55e;color:#fff}.btn.ghost{background:#fff;border:1px solid var(--line);color:#555}
.btn.red{background:var(--red);color:#fff}.btn.blue{background:#3b82f6;color:#fff}
.btn.orange{background:#f59e0b;color:#fff}.btn.purple{background:#8b5cf6;color:#fff}
.btn.sm{padding:5px 12px;font-size:11px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* AUTH */
.auth-wrap{max-width:400px;margin:60px auto}
.auth-card{background:#fff;border-radius:22px;padding:36px;border:1px solid var(--line);box-shadow:0 4px 24px rgba(0,0,0,.07);text-align:center}
.auth-title{font-size:22px;font-weight:800;margin:12px 0 6px}
.auth-sub{font-size:12px;color:#64748b;font-weight:600;margin-bottom:24px;line-height:1.6}
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:13px;font-family:inherit;outline:none;margin-bottom:10px}
.fi:focus{border-color:var(--ok);box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.auth-toggle{font-size:12px;color:#3b82f6;font-weight:700;cursor:pointer;margin-top:12px;display:inline-block}
.auth-toggle:hover{text-decoration:underline}
.auth-error{font-size:11px;color:var(--no);font-weight:700;margin-top:8px;display:none}
.auth-error.show{display:block}
.role-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:800}
.role-badge.admin{background:#ede9fe;color:#5b21b6}
.role-badge.user{background:#e0f2fe;color:#0369a1}

/* HOME */
.gstats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.gs{background:#fff;border-radius:14px;padding:14px 16px;border:1px solid var(--line)}
.gs-l{font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
.gs-v{font-size:24px;font-weight:800;color:var(--red);margin-top:3px}
.gs-s{font-size:10px;color:#94a3b8;font-weight:600;margin-top:1px}
.org-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.org-card{background:#fff;border:2px solid var(--line);border-radius:18px;padding:18px;position:relative;overflow:hidden;transition:.2s}
.org-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--tA),var(--tB))}
.org-card:hover{border-color:#971b2f44;box-shadow:0 6px 24px rgba(0,0,0,.08)}
.org-name{font-size:15px;font-weight:800;margin-bottom:10px}
.track-row{display:flex;gap:10px;margin-bottom:8px}
.track-box{flex:1;background:#f8fafc;border-radius:10px;padding:10px;text-align:center;border:1px solid var(--line)}
.track-label{font-size:9px;font-weight:700;color:#64748b;margin-bottom:3px}
.track-pct{font-size:20px;font-weight:800}
.track-bar{height:4px;background:#f1f5f9;border-radius:99px;overflow:hidden;margin-top:4px}
.track-fill{height:100%;border-radius:99px}
.who-summary{display:flex;gap:6px;margin-bottom:10px}
.who-sum-box{flex:1;text-align:center;padding:6px;border-radius:8px;border:1px solid var(--line);background:#fff}
.who-sum-label{font-size:8px;font-weight:700;color:#94a3b8}
.who-sum-pct{font-size:14px;font-weight:800}

/* DASHBOARD */
.dash-section{margin-bottom:24px}
.dash-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.heatmap-grid{display:grid;gap:2px}
.heatmap-cell{border-radius:4px;padding:4px;text-align:center;font-size:9px;font-weight:700;min-height:32px;display:flex;align-items:center;justify-content:center}
.weak-item{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.weak-bar{height:6px;background:#f1f5f9;border-radius:99px;flex:1;overflow:hidden}
.weak-fill{height:100%;border-radius:99px}

/* CHECKLIST */
.cl-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.cl-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.cl-tab{padding:6px 14px;border-radius:14px;border:1px solid var(--line);background:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:.13s}
.cl-tab.on{color:#fff}
.search-filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:9px 14px 9px 34px;border:1.5px solid var(--line);border-radius:12px;font-size:12px;font-family:inherit;outline:none;background:#fff}
.search-box input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.search-box::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px}
.filter-wrap{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.filter-group{display:flex;gap:4px;flex-wrap:wrap}
.filter-group-label{font-size:9px;font-weight:700;color:#94a3b8;margin-bottom:2px;display:block}
.f-btn{padding:5px 10px;border-radius:10px;border:1px solid var(--line);background:#fff;font-size:10px;font-weight:700;cursor:pointer;transition:.13s}
.f-btn.on{background:#101820;color:#fff;border-color:#101820}
.f-btn.who-hq.on{background:#6366f1;border-color:#6366f1;color:#fff}
.f-btn.who-local.on{background:#0ea5e9;border-color:#0ea5e9;color:#fff}
.f-btn.who-both.on{background:#f59e0b;border-color:#f59e0b;color:#fff}
.search-result-info{font-size:11px;color:#64748b;font-weight:600;margin-bottom:10px;padding:6px 10px;background:#fff;border-radius:8px;border:1px solid var(--line);display:none}
.search-result-info.show{display:block}
.highlight{background:#fef08a;border-radius:2px;padding:0 1px}

/* ITEM CARD */
.sec-block{margin-bottom:20px}
.sec-hd{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;margin-bottom:8px}
.sec-hd-label{font-size:12px;font-weight:800;color:#fff}
.sec-hd-cnt{font-size:10px;font-weight:700;color:rgba(255,255,255,.75);margin-left:auto}
.item-card{background:#fff;border:2px solid var(--line);border-radius:14px;padding:14px;margin-bottom:7px;transition:.2s}
.item-card.done{border-color:#86efac;background:#f0fdf4}
.item-card.flagged{border-color:#fca5a5;background:#fff8f8}
.item-card.partial-st{border-color:#fcd34d;background:#fffbeb}
.item-top{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.item-name{font-size:13px;font-weight:800;color:#1e293b;line-height:1.5;flex:1;min-width:200px}
.imp-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;flex-shrink:0}
.imp-badge.H{background:#fee2e2;color:#991b1b}.imp-badge.M{background:#fef3c7;color:#92400e}.imp-badge.L{background:#f1f5f9;color:#475569}
.who-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;flex-shrink:0}
.who-tag.hq{background:#ede9fe;color:#5b21b6}.who-tag.local{background:#e0f2fe;color:#0369a1}.who-tag.both{background:#fef3c7;color:#92400e}
.detail-toggle{font-size:11px;font-weight:700;color:#3b82f6;cursor:pointer;user-select:none;margin-bottom:6px;display:inline-block}
.detail-toggle:hover{color:#1d4ed8;text-decoration:underline}
.detail-box{display:none;margin-bottom:10px}
.detail-box.open{display:block}
.detail-section{margin-bottom:8px}
.detail-label{font-size:10px;font-weight:800;color:#64748b;margin-bottom:3px}
.detail-text{font-size:11px;color:#374151;line-height:1.6;background:#f8fafc;border-radius:8px;padding:8px 10px;border-left:3px solid var(--line)}
.detail-text.why{border-left-color:#ef4444}
.detail-text.how{border-left-color:#3b82f6}
.detail-text.done-criteria{border-left-color:#22c55e}
.item-btns{display:flex;gap:5px}
.ib{flex:1;padding:7px;border-radius:10px;border:2px solid var(--line);background:#fff;font-size:11px;font-weight:800;cursor:pointer;text-align:center;transition:.15s}
.ib.yes{border-color:#86efac;color:#16a34a}.ib.yes.on{background:var(--ok);color:#fff;border-color:var(--ok)}
.ib.no{border-color:#fca5a5;color:#dc2626}.ib.no.on{background:var(--no);color:#fff;border-color:var(--no)}
.ib.partial{border-color:#fcd34d;color:#92400e}.ib.partial.on{background:#f59e0b;color:#fff;border-color:#f59e0b}
.ib:disabled{opacity:.4;cursor:not-allowed}
.memo-row{margin-top:6px}
.memo-tog{font-size:10px;font-weight:700;color:#94a3b8;cursor:pointer}
.memo-box{display:none;margin-top:5px}
.memo-box.open{display:block}
.memo-area{width:100%;height:48px;border:1px solid #e2e8f0;border-radius:8px;padding:7px;resize:none;font-size:11px;font-family:inherit;outline:none}
.memo-save{margin-top:3px;padding:4px 10px;background:var(--red);color:#fff;border:none;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;float:right}

/* RESULT */
.result-hero{background:#fff;border-radius:18px;border:1px solid var(--line);padding:22px;margin-bottom:14px;text-align:center}
.rg-pct{font-size:40px;font-weight:800;color:var(--red);margin:6px 0}
.track-summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.ts-box{border-radius:14px;padding:16px;text-align:center;border:2px solid var(--line)}
.ts-box.tA{border-color:var(--tA);background:#f5f3ff}
.ts-box.tB{border-color:var(--tB);background:#fffbeb}
.ts-label{font-size:11px;font-weight:800;margin-bottom:4px}
.ts-pct{font-size:28px;font-weight:800}
.who-result-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0}
.who-result-box{border-radius:12px;padding:12px;text-align:center;border:1px solid var(--line);background:#fff}
.who-result-label{font-size:10px;font-weight:700;margin-bottom:2px}
.who-result-pct{font-size:22px;font-weight:800}
.who-result-detail{font-size:9px;color:#94a3b8;font-weight:600;margin-top:2px}
.sec-minis{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;margin-top:12px}
.sec-mini{background:#f8fafc;border-radius:10px;padding:8px;text-align:center;border:1px solid var(--line)}
.sec-mini-pct{font-size:15px;font-weight:800}
.sec-mini-lbl{font-size:8px;color:#64748b;font-weight:700;margin-top:2px}

/* COMPARE */
.cmp-tbl{width:100%;border-collapse:separate;border-spacing:0;border-radius:14px;border:1px solid var(--line);overflow:hidden;background:#fff}
.cmp-tbl th,.cmp-tbl td{padding:8px 10px;font-size:11px;border-bottom:1px solid var(--line)}
.cmp-tbl th{background:#f8fafc;font-weight:800;color:#64748b}
.cmp-tbl tr:last-child td{border-bottom:none}
.heat{border-radius:8px;padding:3px 8px;font-weight:800;font-size:10px;display:inline-block}

/* COMMENTS */
.comments-section{margin-top:20px;background:#fff;border-radius:14px;border:1px solid var(--line);padding:16px}
.comments-title{font-size:13px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.comment-item{padding:10px;border-radius:10px;background:#f8fafc;margin-bottom:8px;border:1px solid var(--line)}
.comment-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.comment-author{font-size:11px;font-weight:700;color:#1e293b}
.comment-time{font-size:9px;color:#94a3b8;font-weight:600}
.comment-text{font-size:12px;color:#374151;line-height:1.6}
.comment-input-row{display:flex;gap:8px;margin-top:10px}
.comment-input{flex:1;padding:9px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:12px;font-family:inherit;outline:none}
.comment-input:focus{border-color:#3b82f6}
.comment-delete{font-size:9px;color:#94a3b8;cursor:pointer;font-weight:700}
.comment-delete:hover{color:#ef4444}

/* IMPORT */
.import-section{background:#fff;border-radius:14px;border:2px dashed var(--line);padding:20px;text-align:center;margin-bottom:14px}
.import-section:hover{border-color:#3b82f6}
.import-result{margin-top:12px;padding:12px;border-radius:10px;font-size:12px;font-weight:600;display:none}
.import-result.show{display:block}
.import-result.success{background:#f0fdf4;color:#16a34a;border:1px solid #86efac}
.import-result.error{background:#fff8f8;color:#dc2626;border:1px solid #fca5a5}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px}
.mov.open{display:flex}
.modal{background:#fff;border-radius:20px;padding:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:800;margin-bottom:12px}
.fg{margin-bottom:10px}
.fl{font-size:11px;font-weight:700;color:#374151;margin-bottom:3px;display:block}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.no-results{text-align:center;padding:32px;color:#94a3b8;font-weight:700;font-size:13px;background:#fff;border-radius:14px;border:1px solid var(--line)}
.readonly-badge{display:inline-block;padding:2px 8px;border-radius:6px;background:#f1f5f9;color:#94a3b8;font-size:9px;font-weight:700;margin-left:6px}
</style>
</head>
<body>

<header>
<div class="hi">
<div class="logo"><h1>🌱 글로벌 CS 운영 함께 단계 올리기</h1><p id="headerSub">로그인이 필요합니다</p></div>
<div class="nav" id="mainNav" style="display:none">
<button class="nav-btn" id="nav-home" onclick="go('home')">Overview</button>
<button class="nav-btn" id="nav-dashboard" onclick="go('dashboard')" style="display:none">📊 Dashboard</button>
<button class="nav-btn" id="nav-compare" onclick="go('compare')">Compare</button>
<button class="nav-btn" onclick="exportCSV()">CSV</button>
<span class="user-info" id="userInfoSpan"></span>
<button class="nav-btn" onclick="doLogout()">로그아웃</button>
</div>
</div>
</header>

<!-- AUTH -->
<div class="page active" id="page-auth">
<div class="auth-wrap"><div class="auth-card">
<div style="font-size:48px">🌏</div>
<div class="auth-title" id="authTitle">로그인</div>
<div class="auth-sub">회사 이메일로 로그인하세요</div>
<input class="fi" id="authEmail" placeholder="Email" type="email"/>
<input class="fi" id="authPw" placeholder="Password" type="password"/>
<div id="signupFields" style="display:none">
<input class="fi" id="authName" placeholder="이름"/>
<select class="fi-select fi" id="authOrgSelect" onchange="toggleOtherOrg()">
<option value="">소속 법인을 선택하세요</option>
<option value="InBody USA">InBody USA</option>
<option value="InBody EU">InBody EU</option>
<option value="InBody Oceania">InBody Oceania</option>
<option value="InBody UK">InBody UK</option>
<option value="InBody Japan">InBody Japan</option>
<option value="InBody China">InBody China</option>
<option value="InBody Türkiye">InBody Türkiye</option>
<option value="InBody Asia">InBody Asia</option>
<option value="InBody Mexico">InBody Mexico</option>
<option value="InBody India">InBody India</option>
<option value="InBody Vietnam">InBody Vietnam</option>
<option value="InBody New York">InBody New York</option>
<option value="__other__">Other (직접 입력)</option>
</select>
<input class="fi" id="authOrgOther" placeholder="법인명을 직접 입력하세요" style="display:none"/>
</div>
<div class="auth-error" id="authError"></div>
<button class="btn red" style="width:100%;justify-content:center;padding:13px;font-size:14px" id="authBtn" onclick="doAuth()">로그인</button>
<div class="auth-toggle" id="authToggle" onclick="toggleAuthMode()">계정이 없으신가요? 회원가입</div>
</div></div>
</div>

<!-- HOME -->
<div class="page" id="page-home">
<div class="gstats" id="gstats"></div>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
<div style="font-size:15px;font-weight:800">법인 현황</div>
<div style="display:flex;gap:6px;flex-wrap:wrap">
<button class="btn green sm" id="addOrgBtn" onclick="openAdd()" style="display:none">＋ 법인 추가</button>
</div>
</div>
<div class="org-grid" id="orgGrid"></div>
</div>

<!-- DASHBOARD -->
<div class="page" id="page-dashboard">
<div style="font-size:18px;font-weight:800;margin-bottom:16px">📊 본사 대시보드</div>
<div id="dashContent"></div>
</div>

<!-- CHECKLIST -->
<div class="page" id="page-checklist">
<div class="cl-top">
<button class="btn ghost sm" onclick="go('home')">← 목록</button>
<span id="clOrg" style="font-size:13px;font-weight:800"></span>
<span id="clReadonly"></span>
<div style="display:flex;gap:6px;flex-wrap:wrap">
<button class="btn orange sm" id="btnTemplate" onclick="downloadTemplate()">📥 템플릿 다운로드</button>
<button class="btn purple sm" id="btnImport" onclick="document.getElementById('importFile').click()">📤 엑셀 업로드</button>
<input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleImport(event)"/>
<button class="btn blue sm" onclick="go('result')">결과 보기 →</button>
</div>
</div>
<div class="import-result" id="importResult"></div>
<div class="cl-tabs" id="clTabs"></div>
<div class="search-filter-bar">
<div class="search-box"><input id="searchInput" placeholder="항목명, 목적, 방법으로 검색..." oninput="onSearch()"/></div>
</div>
<div class="filter-wrap">
<div><span class="filter-group-label">상태</span><div class="filter-group" id="fgStatus"></div></div>
<div><span class="filter-group-label">중요도</span><div class="filter-group" id="fgImp"></div></div>
<div><span class="filter-group-label">담당</span><div class="filter-group" id="fgWho"></div></div>
</div>
<div class="search-result-info" id="searchInfo"></div>
<div id="clBody"></div>
<!-- Comments Section -->
<div class="comments-section" id="commentsSection">
<div class="comments-title">💬 법인 코멘트</div>
<div id="commentsList"></div>
<div class="comment-input-row">
<input class="comment-input" id="commentInput" placeholder="코멘트를 남겨주세요..." onkeydown="if(event.key==='Enter')addComment()"/>
<button class="btn blue sm" onclick="addComment()">등록</button>
</div>
</div>
</div>

<!-- RESULT -->
<div class="page" id="page-result">
<div style="max-width:860px;margin:0 auto">
<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
<button class="btn ghost sm" onclick="go('home')">← 목록</button>
<button class="btn ghost sm" onclick="go('checklist')">← 체크리스트</button>
</div>
<div class="result-hero" id="resultHero"></div>
<div id="resultTodo"></div>
</div>
</div>

<!-- COMPARE -->
<div class="page" id="page-compare">
<div style="font-size:15px;font-weight:800;margin-bottom:14px">법인 비교</div>
<div id="cmpWrap"></div>
</div>

<!-- ADD ORG MODAL -->

/* ══ HELPERS ══ */
function _h(s){return(s??"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function whoLabel(w){return{hq:"본사",local:"현지",both:"공통"}[w]||w;}
function heat(p){if(p>=80)return"background:#d1fae5;color:#065f46";if(p>=50)return"background:#fef3c7;color:#92400e";return"background:#fee2e2;color:#991b1b";}
const GROWTH=[{min:0,max:19,icon:"🌱",label:"씨앗"},{min:20,max:39,icon:"🌿",label:"새싹"},{min:40,max:59,icon:"🌳",label:"나무"},{min:60,max:79,icon:"🍃",label:"잎무성"},{min:80,max:100,icon:"🍎",label:"열매"}];
function getG(p){return GROWTH.find(g=>p>=g.min&&p<=g.max)||GROWTH[0];}
function isAdmin(){return currentUser&&currentUser.role==="admin";}
function canEdit(orgId){if(isAdmin())return true;const org=orgsCache.find(o=>o.id===orgId);return org&&org.createdBy===currentUser?.uid;}
function getSt(oid,iid){return(responsesCache[oid]||{})[iid]||"";}
function getMemo(oid,iid){return(memosCache[oid]||{})[iid]||"";}
function calcOrg(oid){let d=0;ALL.forEach(i=>{if(getSt(oid,i.id)==="yes")d++;});return{total:ALL.length,done:d,pct:ALL.length?Math.round(d*100/ALL.length):0};}
function calcSec(oid,sid){const its=ALL.filter(i=>i.sec===sid);return its.length?Math.round(its.filter(i=>getSt(oid,i.id)==="yes").length*100/its.length):0;}
function calcTrack(oid,tid){const its=ALL.filter(i=>{const s=SECTIONS.find(x=>x.id===i.sec);return s&&s.track===tid;});return its.length?Math.round(its.filter(i=>getSt(oid,i.id)==="yes").length*100/its.length):0;}
function calcWhoExact(oid,who){const its=ALL.filter(i=>i.who===who);const d=its.filter(i=>getSt(oid,i.id)==="yes").length;return{total:its.length,done:d,pct:its.length?Math.round(d*100/its.length):0};}

/* ══ FIREBASE DATA ══ */
async function loadAllData(){
  try{
    const orgSnap=await db.collection("orgs").get();
    orgsCache=[];
    orgSnap.forEach(doc=>{orgsCache.push({id:doc.id,...doc.data()});});
    responsesCache={};memosCache={};commentsCache={};
    for(const org of orgsCache){
      try{
        const rDoc=await db.collection("responses").doc(org.id).get();
        if(rDoc.exists)responsesCache[org.id]=rDoc.data();
        const mDoc=await db.collection("memos").doc(org.id).get();
        if(mDoc.exists)memosCache[org.id]=mDoc.data();
      }catch(e){}
    }
  }catch(e){console.error("Load error:",e);}
}

async function loadComments(orgId){
  try{
    const snap=await db.collection("comments").where("orgId","==",orgId).orderBy("createdAt","desc").limit(50).get();
    const list=[];
    snap.forEach(doc=>{list.push({id:doc.id,...doc.data()});});
    commentsCache[orgId]=list;
  }catch(e){commentsCache[orgId]=[];}
}

async function saveResponse(orgId,itemId,value){
  if(!responsesCache[orgId])responsesCache[orgId]={};
  responsesCache[orgId][itemId]=value;
  try{await db.collection("responses").doc(orgId).set(responsesCache[orgId]);}catch(e){console.error(e);}
}

async function saveBulkResponses(orgId,data){
  if(!responsesCache[orgId])responsesCache[orgId]={};
  Object.assign(responsesCache[orgId],data);
  try{await db.collection("responses").doc(orgId).set(responsesCache[orgId]);}catch(e){console.error(e);}
}

async function saveMemoToDb(orgId,itemId,text){
  if(!memosCache[orgId])memosCache[orgId]={};
  memosCache[orgId][itemId]=text;
  try{await db.collection("memos").doc(orgId).set(memosCache[orgId]);}catch(e){console.error(e);}
}

let authMode="login";
function toggleAuthMode(){
  authMode=authMode==="login"?"signup":"login";
  document.getElementById('authTitle').textContent=authMode==="login"?"로그인":"회원가입";
  document.getElementById('authBtn').textContent=authMode==="login"?"로그인":"회원가입";
  document.getElementById('authToggle').textContent=authMode==="login"?"계정이 없으신가요? 회원가입":"이미 계정이 있으신가요? 로그인";
  document.getElementById('signupFields').style.display=authMode==="signup"?"block":"none";
  document.getElementById('authError').className='auth-error';
}
function showAuthError(msg){const el=document.getElementById('authError');el.textContent=msg;el.className='auth-error show';}
function toggleOtherOrg(){
  const sel=document.getElementById('authOrgSelect');
  const other=document.getElementById('authOrgOther');
  other.style.display=sel.value==='__other__'?'block':'none';
  if(sel.value!=='__other__')other.value='';
}
function getSelectedOrg(){
  const sel=document.getElementById('authOrgSelect');
  if(sel.value==='__other__')return document.getElementById('authOrgOther').value.trim();
  return sel.value;
}

async function doAuth(){
  const email=document.getElementById('authEmail').value.trim();
  const pw=document.getElementById('authPw').value;
  if(!email||!pw)return showAuthError("이메일과 비밀번호를 입력하세요.");
  try{
    if(authMode==="signup"){
      if(!email.endsWith("@inbody.com"))return showAuthError("@inbody.com 이메일만 가입할 수 있습니다.");
      const name=document.getElementById('authName').value.trim();
      const orgName=getSelectedOrg();
      if(!name||!orgName)return showAuthError("이름과 법인명을 입력하세요.");
      const cred=await auth.createUserWithEmailAndPassword(email,pw);
      const role=ADMIN_EMAILS.includes(email)?"admin":"user";
      await db.collection("users").doc(cred.user.uid).set({email,name,orgName,role,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }else{
      await auth.signInWithEmailAndPassword(email,pw);
    }
  }catch(e){
    const msgs={"auth/email-already-in-use":"이미 사용 중인 이메일입니다.","auth/invalid-email":"유효하지 않은 이메일입니다.","auth/weak-password":"비밀번호가 너무 짧습니다.","auth/user-not-found":"등록되지 않은 이메일입니다.","auth/wrong-password":"비밀번호가 틀렸습니다.","auth/invalid-credential":"이메일 또는 비밀번호가 틀렸습니다."};
    showAuthError(msgs[e.code]||e.message);
  }
}
function doLogout(){auth.signOut();}

auth.onAuthStateChanged(async user=>{
  if(user){
    try{
      const uDoc=await db.collection("users").doc(user.uid).get();
      if(!uDoc.exists){auth.signOut();return;}
      const ud=uDoc.data();
      const role=ADMIN_EMAILS.includes(ud.email)?"admin":(ud.role||"user");
      currentUser={uid:user.uid,email:ud.email,name:ud.name,orgName:ud.orgName,role};
      document.getElementById('headerSub').textContent=`${ud.name} (${ud.orgName}) · ${role==="admin"?"본사 관리자":"법인 사용자"}`;
      document.getElementById('userInfoSpan').innerHTML=`${_h(ud.email)} <span class="role-badge ${role}">${role==="admin"?"Admin":"User"}</span>`;
      document.getElementById('mainNav').style.display='flex';
      if(isAdmin()){document.getElementById('nav-dashboard').style.display='';document.getElementById('addOrgBtn').style.display='';}
      await loadAllData();
      if(role!=="admin"&&!orgsCache.find(o=>o.createdBy===user.uid)){
        const ref=await db.collection("orgs").add({name:ud.orgName,createdBy:user.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
        orgsCache.push({id:ref.id,name:ud.orgName,createdBy:user.uid});
      }
      go('home');
    }catch(e){console.error(e);}
  }else{
    currentUser=null;
    document.getElementById('mainNav').style.display='none';
    document.getElementById('headerSub').textContent='로그인이 필요합니다';
    go('auth');
  }
});

/* ══ NAV ══ */
function go(p){
  ST.page=p;
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('page-'+p);if(el)el.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  const n=document.getElementById('nav-'+p);if(n)n.classList.add('on');
  if(p==='home')renderHome();
  if(p==='dashboard')renderDashboard();
  if(p==='checklist')renderChecklist();
  if(p==='result')renderResult();
  if(p==='compare')renderCompare();
}

/* ══ HOME ══ */
function renderHome(){
  const myOrgs=isAdmin()?orgsCache:orgsCache.filter(o=>o.createdBy===currentUser?.uid);
  const avg=myOrgs.length?Math.round(myOrgs.reduce((a,o)=>a+calcOrg(o.id).pct,0)/myOrgs.length):0;
  const g=getG(avg);
  document.getElementById('gstats').innerHTML=`
    <div class="gs"><div class="gs-l">${isAdmin()?'전체':'내'} 법인</div><div class="gs-v">${myOrgs.length}</div></div>
    <div class="gs"><div class="gs-l">평균 완료율</div><div class="gs-v">${avg}%</div><div class="gs-s">${g.icon} ${g.label}</div></div>
    <div class="gs"><div class="gs-l">총 점검 항목</div><div class="gs-v">${ALL.length}</div></div>`;
  document.getElementById('orgGrid').innerHTML=myOrgs.map(o=>{
    const ov=calcOrg(o.id),g=getG(ov.pct);
    const tA=calcTrack(o.id,"tA"),tB=calcTrack(o.id,"tB");
    const wHq=calcWhoExact(o.id,"hq"),wLo=calcWhoExact(o.id,"local"),wBo=calcWhoExact(o.id,"both");
    return`<div class="org-card">
      <div class="org-name">${_h(o.name)} <span style="font-size:11px;color:#94a3b8">${g.icon} ${g.label} ${ov.pct}%</span></div>

function downloadTemplate(){
  const wb=XLSX.utils.book_new();
  const orgName=orgsCache.find(o=>o.id===ST.oid)?.name||"법인";
  const impMap={H:"상",M:"중",L:"하"};
  const whoMap={local:"현지",both:"공통",hq:"본사"};
  // HQ 항목 제외, 현지+공통만
  const filtered=ALL.filter(it=>it.who==="local"||it.who==="both");
  const rows=[["Track","Section","ID","Importance","Owner",`Item (${orgName})`,"Why","How","Done Criteria","상태 (충족/미충족/부분)","메모"]];
  filtered.forEach(it=>{
    const sec=SECTIONS.find(s=>s.id===it.sec);
    const trk=TRACKS.find(t=>t.id===sec.track);
    rows.push([trk.label,sec.label,it.id,impMap[it.imp],whoMap[it.who],it.name,it.why,it.how,it.done,"",""]);
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:22},{wch:16},{wch:4},{wch:10},{wch:6},{wch:45},{wch:40},{wch:40},{wch:45},{wch:22},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,"체크리스트");
  XLSX.writeFile(wb,`${orgName}_체크리스트_템플릿.xlsx`);
}

async function handleImport(event){
  const file=event.target.files[0];
  if(!file)return;
  const resultEl=document.getElementById('importResult');
  if(!canEdit(ST.oid)){
    resultEl.className='import-result show error';
    resultEl.textContent='편집 권한이 없습니다.';
    event.target.value='';return;
  }
  try{
    const data=await file.arrayBuffer();
    const wb=XLSX.read(data);
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1});
    if(rows.length<2){
      resultEl.className='import-result show error';
      resultEl.textContent='데이터가 없습니다.';
      event.target.value='';return;
    }
    const header=rows[0].map(h=>(h||"").toString().trim());
    const statusCol=header.findIndex(h=>h.includes("상태"));
    const idCol=header.findIndex(h=>h.includes("번호"));
    const nameCol=header.findIndex(h=>h.includes("항목명"));
    const memoCol=header.findIndex(h=>h.includes("메모"));
    if(statusCol===-1){
      resultEl.className='import-result show error';
      resultEl.textContent='"상태" 열을 찾을 수 없습니다. 템플릿을 사용해주세요.';
      event.target.value='';return;
    }
    const statusMap={"충족":"yes","미충족":"no","부분":"partial","yes":"yes","no":"no","partial":"partial","o":"yes","x":"no","△":"partial"};
    let matched=0,skipped=0;
    const bulkResp={};
    const bulkMemo={};
    for(let i=1;i<rows.length;i++){
      const row=rows[i];if(!row||!row.length)continue;
      const rawStatus=(row[statusCol]||"").toString().trim();
      const status=statusMap[rawStatus.toLowerCase()]||statusMap[rawStatus];
      if(!status){skipped++;continue;}
      let item=null;
      if(idCol>=0&&row[idCol]){
        const rid=parseInt(row[idCol]);
        item=ALL.find(a=>a.id===rid);
      }
      if(!item&&nameCol>=0&&row[nameCol]){
        const rname=(row[nameCol]||"").toString().trim();
        item=ALL.find(a=>a.name.includes(rname)||rname.includes(a.name));
      }
      if(item){
        bulkResp[item.id]=status;
        if(memoCol>=0&&row[memoCol]){
          bulkMemo[item.id]=(row[memoCol]||"").toString().trim();
        }
        matched++;
      }else{skipped++;}
    }
    if(matched>0){
      await saveBulkResponses(ST.oid,bulkResp);
      if(Object.keys(bulkMemo).length>0){
        if(!memosCache[ST.oid])memosCache[ST.oid]={};
        Object.assign(memosCache[ST.oid],bulkMemo);
        await db.collection("memos").doc(ST.oid).set(memosCache[ST.oid]);
      }
    }
    resultEl.className=`import-result show ${matched>0?'success':'error'}`;
    resultEl.textContent=`✅ ${matched}개 항목 반영 완료${skipped>0?` / ⚠️ ${skipped}개 항목 건너뜀 (상태값 미입력 또는 매칭 실패)`:''}`;
    renderChecklist();
  }catch(e){
    resultEl.className='import-result show error';
    resultEl.textContent='파일 읽기 오류: '+e.message;
  }
  event.target.value='';
}

function onSearch(){ST.search=document.getElementById('searchInput').value.trim().toLowerCase();renderChecklistBody();}
function matchSearch(it,q){if(!q)return true;const hay=(it.name+' '+it.why+' '+it.how+' '+it.done).toLowerCase();return q.split(/\s+/).every(w=>hay.includes(w));}
function highlightText(text,query){if(!query)return _h(text);const escaped=_h(text);const words=query.split(/\s+/).filter(Boolean);if(!words.length)return escaped;let r=escaped;words.forEach(w=>{const re=new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');r=r.replace(re,'<span class="highlight">$1</span>');});return r;}

function renderChecklistBody(){
  const q=ST.search;const isSearchMode=!!q;const editable=canEdit(ST.oid);
  let items=isSearchMode?ALL.filter(i=>matchSearch(i,q)):ST.sec==="all"?[...ALL]:ALL.filter(i=>i.sec===ST.sec);
  if(ST.fStatus==="todo")items=items.filter(i=>getSt(ST.oid,i.id)!=="yes");
  else if(ST.fStatus!=="all")items=items.filter(i=>getSt(ST.oid,i.id)===ST.fStatus);
  if(ST.fImp!=="all")items=items.filter(i=>i.imp===ST.fImp);
  if(ST.fWho!=="all")items=items.filter(i=>i.who===ST.fWho);

  const infoEl=document.getElementById('searchInfo');
  if(isSearchMode){infoEl.className='search-result-info show';infoEl.innerHTML=`🔍 "${_h(q)}" 검색 결과: <strong>${items.length}</strong>개 <button class="f-btn" style="margin-left:8px" onclick="ST.search='';document.getElementById('searchInput').value='';renderChecklistBody()">초기화</button>`;}
  else{infoEl.className='search-result-info';}
  if(!items.length){document.getElementById('clBody').innerHTML=`<div class="no-results">${isSearchMode?'검색 결과가 없습니다.':'해당 조건의 항목이 없습니다.'}</div>`;return;}

  const secGroups=isSearchMode||ST.sec==="all"?SECTIONS.filter(s=>items.some(i=>i.sec===s.id)):[SECTIONS.find(s=>s.id===ST.sec)].filter(Boolean);
  let html="";
  secGroups.forEach(sec=>{
    const secItems=items.filter(i=>i.sec===sec.id);if(!secItems.length)return;
    const trk=TRACKS.find(t=>t.id===sec.track);
    html+=`<div class="sec-block"><div class="sec-hd" style="background:${sec.color}"><span style="font-size:16px">${sec.emoji}</span><span class="sec-hd-label">${trk.short} > ${sec.label}</span><span class="sec-hd-cnt">${secItems.length}개 · 충족 ${secItems.filter(i=>getSt(ST.oid,i.id)==="yes").length}</span></div>`;
    secItems.forEach(it=>{
      const s=getSt(ST.oid,it.id);const memo=getMemo(ST.oid,it.id);const nameHtml=isSearchMode?highlightText(it.name,q):_h(it.name);
      const dis=editable?"":" disabled";
      html+=`<div class="item-card ${s==="yes"?"done":s==="no"?"flagged":s==="partial"?"partial-st":""}" id="item_${it.id}">
        <div class="item-top"><div class="item-name">${nameHtml}</div><span class="imp-badge ${it.imp}">${{H:"상",M:"중",L:"하"}[it.imp]}</span><span class="who-tag ${it.who}">${whoLabel(it.who)}</span></div>
        <div class="detail-toggle" onclick="toggleDetail(${it.id})">▸ 목적 · 방법 · 달성기준 보기</div>
        <div class="detail-box" id="det_${it.id}">
          <div class="detail-section"><div class="detail-label">🔴 목적 (Why)</div><div class="detail-text why">${isSearchMode?highlightText(it.why,q):_h(it.why)}</div></div>
          <div class="detail-section"><div class="detail-label">🔵 방법 (How)</div><div class="detail-text how">${isSearchMode?highlightText(it.how,q):_h(it.how)}</div></div>
          <div class="detail-section"><div class="detail-label">🟢 달성 기준 (Done)</div><div class="detail-text done-criteria">${isSearchMode?highlightText(it.done,q):_h(it.done)}</div></div>
        </div>
        <div class="item-btns">
          <button class="ib yes ${s==="yes"?"on":""}"${dis} onclick="setItem(${it.id},'yes')">✓ 충족</button>
          <button class="ib partial ${s==="partial"?"on":""}"${dis} onclick="setItem(${it.id},'partial')">△ 부분</button>
          <button class="ib no ${s==="no"?"on":""}"${dis} onclick="setItem(${it.id},'no')">✗ 미충족</button>
        </div>
        <div class="memo-row">
          <span class="memo-tog" onclick="toggleMemo(${it.id})">📝 메모 ${memo?"(작성됨)":"추가"}</span>
          <div class="memo-box" id="mb_${it.id}">
            <textarea class="memo-area" id="mt_${it.id}" placeholder="현황, 담당자, 기한 등"${editable?"":"readonly"}>${_h(memo)}</textarea>
            ${editable?`<button class="memo-save" onclick="saveMemo(${it.id})">저장</button><div style="clear:both"></div>`:""}
          </div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('clBody').innerHTML=html;
}

    <div style="font-size:48px">${g.icon}</div><div class="rg-pct">${ov.pct}%</div>
    <div style="font-size:12px;color:#64748b;font-weight:600">${_h(org?.name)} · ${ALL.length}개 항목 · ${g.label}</div>
    <div class="track-summary"><div class="ts-box tA"><div class="ts-label" style="color:var(--tA)">A. 조직 운영 기반</div><div class="ts-pct" style="color:var(--tA)">${tA}%</div></div><div class="ts-box tB"><div class="ts-label" style="color:var(--tB)">B. 제품 판매 사이클</div><div class="ts-pct" style="color:var(--tB)">${tB}%</div></div></div>
    <div class="who-result-row">
      <div class="who-result-box"><div class="who-result-label" style="color:#6366f1">🏢 본사</div><div class="who-result-pct" style="color:#6366f1">${wHq.pct}%</div><div class="who-result-detail">${wHq.done}/${wHq.total}</div></div>
      <div class="who-result-box"><div class="who-result-label" style="color:#0ea5e9">📍 현지</div><div class="who-result-pct" style="color:#0ea5e9">${wLo.pct}%</div><div class="who-result-detail">${wLo.done}/${wLo.total}</div></div>
      <div class="who-result-box"><div class="who-result-label" style="color:#f59e0b">🤝 공통</div><div class="who-result-pct" style="color:#f59e0b">${wBo.pct}%</div><div class="who-result-detail">${wBo.done}/${wBo.total}</div></div>
    </div>
    <div class="sec-minis">${secMinis}</div>`;
  const todos=ALL.filter(i=>getSt(ST.oid,i.id)!=="yes");
  let html=`<div style="font-size:14px;font-weight:800;margin:16px 0 10px">📋 미충족/미응답 (${todos.length}개)</div>`;
  if(!todos.length)html+=`<div class="no-results">🎉 모든 항목 충족!</div>`;
  else{SECTIONS.forEach(sec=>{const its=todos.filter(i=>i.sec===sec.id);if(!its.length)return;html+=`<div style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:6px 10px;border-radius:8px;background:${sec.color};color:#fff;font-size:11px;font-weight:800">${sec.emoji} ${sec.label} <span style="opacity:.7;margin-left:auto">${its.length}개</span></div>${its.map(it=>{const s=getSt(ST.oid,it.id);return`<div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:4px;display:flex;align-items:center;gap:8px"><div style="flex:1"><div style="font-size:11px;font-weight:700">${_h(it.name)}</div><div style="font-size:10px;color:${s==="no"?"var(--no)":s==="partial"?"#f59e0b":"#94a3b8"};font-weight:700;margin-top:2px">${s==="no"?"✗ 미충족":s==="partial"?"△ 부분":"— 미응답"}</div></div><span class="imp-badge ${it.imp}">${{H:"상",M:"중",L:"하"}[it.imp]}</span><span class="who-tag ${it.who}">${whoLabel(it.who)}</span></div>`;}).join('')}</div>`;});}
  document.getElementById('resultTodo').innerHTML=html;
}

/* ══ COMPARE ══ */
function renderCompare(){
  if(orgsCache.length<1){document.getElementById('cmpWrap').innerHTML=`<div class="no-results">비교할 법인이 없습니다.</div>`;return;}
  const showDetail=isAdmin();
  let html=`<div style="overflow-x:auto"><table class="cmp-tbl"><thead><tr><th>법인</th><th>전체</th><th>A.조직</th><th>B.판매</th>`;
  if(showDetail){html+=`<th>🏢본사</th><th>📍현지</th><th>🤝공통</th>`;SECTIONS.forEach(s=>{html+=`<th style="color:${s.color}">${s.emoji}</th>`;});}
  html+=`</tr></thead><tbody>`;
  [...orgsCache].sort((a,b)=>calcOrg(b.id).pct-calcOrg(a.id).pct).forEach(o=>{
    const ov=calcOrg(o.id),tA=calcTrack(o.id,"tA"),tB=calcTrack(o.id,"tB");
    html+=`<tr><td style="font-weight:800">${_h(o.name)}</td><td><span class="heat" style="${heat(ov.pct)}">${ov.pct}%</span></td><td><span class="heat" style="${heat(tA)}">${tA}%</span></td><td><span class="heat" style="${heat(tB)}">${tB}%</span></td>`;
    if(showDetail){const wHq=calcWhoExact(o.id,"hq"),wLo=calcWhoExact(o.id,"local"),wBo=calcWhoExact(o.id,"both");html+=`<td><span class="heat" style="${heat(wHq.pct)}">${wHq.pct}%</span></td><td><span class="heat" style="${heat(wLo.pct)}">${wLo.pct}%</span></td><td><span class="heat" style="${heat(wBo.pct)}">${wBo.pct}%</span></td>`;SECTIONS.forEach(s=>{const p=calcSec(o.id,s.id);html+=`<td><span class="heat" style="${heat(p)}">${p}%</span></td>`;});}
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('cmpWrap').innerHTML=html;
}

/* ══ ADD ORG ══ */
function openAdd(){document.getElementById('addModal').classList.add('open');document.getElementById('addName').focus();}
function closeAdd(){document.getElementById('addModal').classList.remove('open');}
async function confirmAdd(){
  const name=document.getElementById('addName').value.trim();
  if(!name)return alert('법인명을 입력하세요.');
  if(orgsCache.some(o=>o.name===name))return alert('같은 이름이 있습니다.');
  try{
    const ref=await db.collection("orgs").add({name,createdBy:currentUser.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    orgsCache.push({id:ref.id,name,createdBy:currentUser.uid});
    document.getElementById('addName').value='';closeAdd();renderHome();
  }catch(e){alert("추가 실패: "+e.message);}
}

/* ══ CSV EXPORT ══ */
function exportCSV(){
  const impMap={H:"상",M:"중",L:"하"};
  const targetOrgs=isAdmin()?orgsCache:orgsCache.filter(o=>o.createdBy===currentUser?.uid);
  const h=["법인","Track","섹션","중요도","담당","항목명","목적","방법","달성기준","상태","메모"];
  const rows=[];
  targetOrgs.forEach(o=>{ALL.forEach(it=>{
    const sec=SECTIONS.find(s=>s.id===it.sec);const trk=TRACKS.find(t=>t.id===sec.track);
    rows.push([o.name,trk.label,sec.label,impMap[it.imp],whoLabel(it.who),it.name,it.why,it.how,it.done,getSt(o.id,it.id),getMemo(o.id,it.id)]);
  });});
  const esc=v=>{const s=String(v??"");return/[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s;};
  const csv=[h.map(esc).join(","),...rows.map(r=>r.map(esc).join(","))].join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));
  a.download=`Checklist_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();a.remove();
}
</script>
